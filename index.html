<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shuttle Feedback</title>
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="theme-color" content="#0f172a">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px 28px;
            border-radius: 24px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(99, 102, 241, 0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            right: -50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: rgba(99, 102, 241, 0.3);
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: #a5b4fc;
        }

        h2 {
            margin-bottom: 4px;
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .api-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .api-badge.connected {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .suggestions-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 8px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            overflow: hidden;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .suggestions-list.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:active, .suggestion-item:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .suggestion-item strong {
            color: #818cf8;
        }

        .recent-section {
            margin-top: 20px;
            text-align: left;
            display: none;
            animation: fadeIn 0.3s ease;
            width: 100%;
        }

        .recent-section.active {
            display: block;
        }

        .recent-toggle {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 14px 16px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .recent-toggle:hover {
            background: rgba(99, 102, 241, 0.1);
            color: #e2e8f0;
        }

        .recent-toggle svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .recent-toggle.open svg {
            transform: rotate(180deg);
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .recent-list.open {
            max-height: 400px;
            opacity: 1;
        }

        .recent-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .recent-item:active, .recent-item:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(4px);
        }

        .recent-item svg {
            width: 16px;
            height: 16px;
            fill: #6366f1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .recent-item:hover svg {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select {
            padding: 14px 8px;
            font-size: 17px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            background-color: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            width: 30%;
            text-align: center;
            font-weight: 600;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            appearance: none;
            -webkit-appearance: none;
        }

        select:focus {
            border-color: #6366f1;
        }

        .input-wrapper {
            position: relative;
            width: 70%;
        }

        input[type="text"] {
            padding: 14px;
            padding-right: 48px;
            font-size: 17px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            background-color: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            width: 100%;
            text-transform: uppercase;
            outline: none;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 1.5px;
            transition: border-color 0.3s;
        }

        .mic-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mic-btn:active {
            background: rgba(99, 102, 241, 0.3);
            transform: translateY(-50%) scale(0.95);
        }

        .mic-btn svg {
            width: 20px;
            height: 20px;
            fill: #a5b4fc;
        }

        .mic-btn.listening {
            background: rgba(239, 68, 68, 0.15);
            animation: pulse 1.5s infinite;
        }

        .mic-btn.listening svg {
            fill: #ef4444;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        input[type="text"]::placeholder {
            color: #475569;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            border-color: #6366f1;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        button.submit-btn {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.5px;
            transition: transform 0.15s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        button.submit-btn:active {
            transform: scale(0.97);
        }

        button.camera-btn {
            width: 54px;
            height: 54px;
            min-width: 54px;
            border-radius: 14px;
            background: rgba(99, 102, 241, 0.15);
            border: 2px solid rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }

        button.camera-btn:active {
            background: rgba(99, 102, 241, 0.3);
        }

        .camera-icon {
            width: 22px;
            height: 22px;
            fill: #a5b4fc;
        }

        #ocr-status {
            font-size: 13px;
            color: #a5b4fc;
            margin-bottom: 12px;
            min-height: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        #cameraInput {
            display: none;
        }

        .preview-area {
            display: none;
            margin-bottom: 14px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .preview-area img {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            display: block;
        }

        .preview-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(4px);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            gap: 16px;
        }

        .spinner-overlay.active {
            display: flex;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .spinner-text {
            color: #a5b4fc;
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e293b;
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal h3 {
            color: #f1f5f9;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .modal p {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .modal p a {
            color: #818cf8;
            text-decoration: underline;
        }

        .modal input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            outline: none;
            font-family: inherit;
            margin-bottom: 14px;
        }

        .modal input:focus {
            border-color: #6366f1;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns button {
            flex: 1;
            padding: 11px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
        }

        .modal-btns .btn-cancel {
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .modal-btns .btn-save {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .flash-success {
            animation: flashGreen 0.5s ease;
        }

        .flash-error {
            animation: flashRed 0.5s ease;
        }

        @keyframes flashGreen {

            0%,
            100% {
                border-color: rgba(99, 102, 241, 0.3);
            }

            50% {
                border-color: #22c55e;
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
            }
        }

        @keyframes flashRed {

            0%,
            100% {
                border-color: rgba(99, 102, 241, 0.3);
            }

            50% {
                border-color: #ef4444;
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            }
        }
    </style>
</head>

<body>

    <div class="container" id="mainContainer">
        <div class="spinner-overlay" id="spinnerOverlay">
            <div class="spinner"></div>
            <div class="spinner-text" id="spinnerText">Processing...</div>
        </div>

        <div class="top-bar">
            <button class="icon-btn" onclick="openSettings()" title="API Settings">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14,12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.49.49,0,0,0,.12-.61l-1.92-3.32a.49.49,0,0,0-.59-.22l-2.39.96a7.04,7.04,0,0,0-1.62-.94l-.36-2.54a.48.48,0,0,0-.48-.41h-3.84a.48.48,0,0,0-.48.41l-.36,2.54a7.04,7.04,0,0,0-1.62.94l-2.39-.96a.49.49,0,0,0-.59.22L2.74,8.87a.48.48,0,0,0,.12.61l2.03,1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03,1.58a.49.49,0,0,0-.12.61l1.92,3.32a.49.49,0,0,0,.59.22l2.39-.96a7.04,7.04,0,0,0,1.62.94l.36,2.54a.48.48,0,0,0,.48.41h3.84a.48.48,0,0,0,.48-.41l.36-2.54a7.04,7.04,0,0,0,1.62-.94l2.39.96a.49.49,0,0,0,.59-.22l1.92-3.32a.49.49,0,0,0-.12-.61ZM12,15.6A3.6,3.6,0,1,1,15.6,12,3.6,3.6,0,0,1,12,15.6Z" />
                </svg>
            </button>
        </div>

        <h2>🚐 Shuttle Feedback</h2>
        <p class="subtitle">Scan plate or enter vehicle number</p>
        <div id="apiBadge" class="api-badge disconnected">NO API KEY</div>

        <div id="ocr-status"></div>

        <div class="preview-area" id="previewArea">
            <img id="previewImg" src="" alt="Captured plate">
            <button class="preview-close" onclick="clearPreview()" title="Clear">✕</button>
        </div>

        <div class="input-group" id="inputGroup">
            <select id="stateCode">
                <option value="TG">TG</option>
                <option value="TS">TS</option>
            </select>
            <div class="input-wrapper">
                <input type="text" id="vehicleNum" placeholder="09EA1234" maxlength="10" autocapitalize="characters" autocomplete="off">
                <button id="micBtn" class="mic-btn" onclick="toggleVoiceInput()" title="Voice Input">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div id="suggestionsList" class="suggestions-list"></div>
            </div>
        </div>

        <div class="btn-row">
            <button class="submit-btn" onclick="openFeedback()">GO →</button>
            <button class="camera-btn" onclick="triggerCamera()" title="Scan Number Plate">
                <svg class="camera-icon" viewBox="0 0 24 24">
                    <path
                        d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </button>
        </div>

        <div id="recentSection" class="recent-section">
            <button class="recent-toggle" onclick="toggleRecentList()">
                <span>Recent Vehicles</span>
                <svg id="recentToggleIcon" viewBox="0 0 24 24">
                    <path d="M7 10l5 5 5-5z"/>
                </svg>
            </button>
            <div id="recentList" class="recent-list"></div>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="environment">
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ API Settings</h3>
            <p>Enter your <strong>Google Gemini API key</strong>.<br>
                Get one at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a>
            </p>
            <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
                <button class="btn-save" onclick="saveApiKey()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('vehicleNum');
        const stateSelect = document.getElementById('stateCode');
        const cameraInput = document.getElementById('cameraInput');
        const statusDiv = document.getElementById('ocr-status');
        const spinnerOverlay = document.getElementById('spinnerOverlay');
        const spinnerText = document.getElementById('spinnerText');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const inputGroup = document.getElementById('inputGroup');
        const apiBadge = document.getElementById('apiBadge');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const micBtn = document.getElementById('micBtn');
        const recentSection = document.getElementById('recentSection');
        const recentList = document.getElementById('recentList');
        const suggestionsList = document.getElementById('suggestionsList');

        let allRecentVehicles = []; // Store it in memory for quick filtering

        function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }

        function updateBadge() {
            const key = getApiKey();
            apiBadge.textContent = key ? 'GEMINI AI ✓' : 'NO API KEY';
            apiBadge.className = key ? 'api-badge connected' : 'api-badge disconnected';
        }

        function openSettings() {
            apiKeyInput.value = getApiKey();
            settingsModal.classList.add('active');
        }

        function closeSettings() { settingsModal.classList.remove('active'); }

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            key ? localStorage.setItem('gemini_api_key', key) : localStorage.removeItem('gemini_api_key');
            updateBadge();
            closeSettings();
        }

        settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettings(); });
        updateBadge();

        function handleInputSuggestions() {
            const val = inputField.value.trim().toUpperCase();
            if (!val) {
                suggestionsList.classList.remove('active');
                return;
            }

            // Simple "contains" match prioritizing the ending portion which the user types
            const state = stateSelect.value;
            const matches = allRecentVehicles.filter(v => v.includes(val) || v.startsWith(state + val));

            if (matches.length === 0) {
                suggestionsList.classList.remove('active');
                return;
            }

            suggestionsList.innerHTML = '';
            matches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                
                // Highlight the matched portion
                let innerHtml = match;
                if (match.startsWith(state + val)) {
                    innerHtml = `<span>${state}</span><strong>${val}</strong><span>${match.substring((state + val).length)}</span>`;
                } else {
                    const idx = match.indexOf(val);
                    if (idx > -1) {
                         innerHtml = `<span>${match.substring(0, idx)}</span><strong>${val}</strong><span>${match.substring(idx + val.length)}</span>`;
                    }
                }
                
                div.innerHTML = innerHtml;

                div.onmousedown = function(e) { 
                    e.preventDefault(); // Prevent blur when clicking item
                    applyPlateNumber(match);
                    suggestionsList.classList.remove('active');
                    openFeedback(); // Auto-submit
                };
                suggestionsList.appendChild(div);
            });
            suggestionsList.classList.add('active');
        }

        inputField.addEventListener('input', function () { 
            this.value = this.value.toUpperCase(); 
            handleInputSuggestions();
        });
        
        inputField.addEventListener('focus', handleInputSuggestions);
        inputField.addEventListener('blur', () => { setTimeout(() => { suggestionsList.classList.remove('active'); }, 150) });
        inputField.addEventListener('keydown', (e) => { if (e.key === 'Enter') openFeedback(); });

        function renderRecentList() {
            if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
                chrome.storage.local.get(['recent_vehicles'], function(result) {
                    allRecentVehicles = result.recent_vehicles || [];
                    displayRecentList(allRecentVehicles);
                });
            } else {
                allRecentVehicles = JSON.parse(localStorage.getItem('recent_vehicles') || '[]');
                displayRecentList(allRecentVehicles);
            }
        }

        function displayRecentList(recent) {
            if (recent.length === 0) {
                recentSection.classList.remove('active');
                return;
            }
            recentList.innerHTML = '';
            recent.forEach(no => {
                const div = document.createElement('div');
                div.className = 'recent-item';
                
                const textSpan = document.createElement('span');
                textSpan.innerText = no;
                div.appendChild(textSpan);

                const arrowIcon = document.createElement('div');
                arrowIcon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>`;
                div.appendChild(arrowIcon);

                div.onclick = function() { 
                    applyPlateNumber(no);
                    openFeedback(); // Auto-submit when clicking a recent item from the list
                };
                recentList.appendChild(div);
            });
            recentSection.classList.add('active');
        }

        // Render list immediately on load if anything exists
        renderRecentList();

        function toggleRecentList() {
            const list = document.getElementById('recentList');
            const toggle = document.querySelector('.recent-toggle');
            if (list) list.classList.toggle('open');
            if (toggle) toggle.classList.toggle('open');
        }

        function triggerCamera() { cameraInput.value = ''; cameraInput.click(); }
        function showSpinner(text) { spinnerText.innerText = text; spinnerOverlay.classList.add('active'); }
        function hideSpinner() { spinnerOverlay.classList.remove('active'); }
        function clearPreview() { previewArea.style.display = 'none'; previewImg.src = ''; }
        function flashSuccess() { inputGroup.classList.add('flash-success'); setTimeout(() => inputGroup.classList.remove('flash-success'), 600); }
        function flashError() { inputGroup.classList.add('flash-error'); setTimeout(() => inputGroup.classList.remove('flash-error'), 600); }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function extractPlateWithGemini(file) {
            const apiKey = getApiKey();
            if (!apiKey) throw new Error('NO_KEY');

            const base64Image = await fileToBase64(file);
            const mimeType = file.type || 'image/jpeg';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            const MAX_RETRIES = 3;
            for (let i = 0; i <= MAX_RETRIES; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Extract ONLY the vehicle registration number. No spaces. Example: TG09EA1234. If not found, say NOT_FOUND." },
                                    { inline_data: { mime_type: mimeType, data: base64Image } }
                                ]
                            }],
                            generationConfig: { temperature: 0.1 }
                        })
                    });

                    if (response.status === 429 && i < MAX_RETRIES) {
                        const wait = Math.pow(2, i) * 2000;
                        await new Promise(r => setTimeout(r, wait));
                        continue;
                    }

                    if (!response.ok) throw new Error(response.status === 400 ? 'INVALID_KEY' : 'API_ERROR');

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    return text.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                } catch (err) {
                    if (i === MAX_RETRIES) throw err;
                }
            }
        }

        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const objectUrl = URL.createObjectURL(file);
            previewImg.src = objectUrl;
            previewArea.style.display = 'block';

            if (!getApiKey()) {
                statusDiv.innerText = "⚠ Set API key first (⚙️)";
                statusDiv.style.color = "#f59e0b";
                flashError();
                return;
            }

            showSpinner('Analyzing plate...');
            try {
                const plateText = await extractPlateWithGemini(file);
                hideSpinner();
                if (!plateText || plateText.includes('NOTFOUND') || plateText.length < 4) {
                    statusDiv.innerText = "Detection failed. Try again.";
                    statusDiv.style.color = "#ef4444";
                    flashError();
                } else {
                    applyPlateNumber(plateText);
                }
            } catch (err) {
                hideSpinner();
                statusDiv.innerText = err.message === 'INVALID_KEY' ? "❌ Invalid Key" : "Error. Try again.";
                statusDiv.style.color = "#ef4444";
                flashError();
            }
            setTimeout(() => { statusDiv.innerText = ""; }, 5000);
            URL.revokeObjectURL(objectUrl);
        });

        const KNOWN_STATES = ['TG', 'TS', 'AP', 'KA', 'MH', 'DL', 'TN', 'KL', 'UP', 'RJ', 'GJ', 'HR', 'PB', 'MP', 'WB'];

        function applyPlateNumber(plateText) {
            const first2 = plateText.substring(0, 2);
            if (KNOWN_STATES.includes(first2)) {
                stateSelect.value = first2;
                inputField.value = plateText.substring(2);
            } else {
                inputField.value = plateText;
            }
            statusDiv.innerText = "✓ Detected: " + plateText;
            statusDiv.style.color = "#22c55e";
            flashSuccess();
        }

        function saveRecentVehicle(fullNo) {
            if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
                chrome.storage.local.get(['recent_vehicles'], function(result) {
                    updateAndSaveList(result.recent_vehicles || [], fullNo, true);
                });
            } else {
                let recent = JSON.parse(localStorage.getItem('recent_vehicles') || '[]');
                updateAndSaveList(recent, fullNo, false);
            }
        }

        function updateAndSaveList(recent, fullNo, useChromeStorage) {
            const index = recent.indexOf(fullNo);
            if (index > -1) {
                recent.splice(index, 1);
            }
            recent.unshift(fullNo);
            if (recent.length > 5) recent.pop(); // Keep max 5 recent vehicles
            
            allRecentVehicles = recent; // Update in-memory copy
            renderRecentList(); // Re-render the bottom accordion to stay synced

            if (useChromeStorage) {
                chrome.storage.local.set({ 'recent_vehicles': recent });
            } else {
                localStorage.setItem('recent_vehicles', JSON.stringify(recent));
            }
        }

        function openFeedback() {
            const fullNo = stateSelect.value + inputField.value.trim().replace(/[^A-Z0-9]/gi, '').toUpperCase();
            if (!inputField.value.trim()) return alert("Enter vehicle number.");
            saveRecentVehicle(fullNo);
            window.location.href = `https://qcommute.falconavl.com/hydemp/ShuttleFeedback/index.html?centerid=5&vehicleno=${fullNo}`;
        }

        let recognition = null;
        let isListening = false;

        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-IN'; // Works well for Indian vehicle plates

            recognition.onstart = function() {
                isListening = true;
                micBtn.classList.add('listening');
                statusDiv.innerText = "Listening...";
                statusDiv.style.color = "#818cf8";
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                const formatted = transcript.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
                
                if (formatted) {
                    applyPlateNumber(formatted);
                } else {
                    statusDiv.innerText = "Could not detect plate number.";
                    statusDiv.style.color = "#ef4444";
                    flashError();
                }
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                statusDiv.innerText = "Voice input failed: " + event.error;
                statusDiv.style.color = "#ef4444";
                flashError();
                stopListening();
            };

            recognition.onend = function() {
                stopListening();
            };
        } else {
            if (micBtn) micBtn.style.display = 'none';
        }

        function toggleVoiceInput() {
            if (!recognition) {
                alert("Voice input is not supported in your browser.");
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            if (statusDiv.innerText === "Listening...") {
                setTimeout(() => { if (statusDiv.innerText === "Listening...") statusDiv.innerText = ""; }, 500);
            }
        }
    </script>
</body>
